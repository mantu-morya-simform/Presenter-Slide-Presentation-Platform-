<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>presenter-slide-presentation-platform-</title>
    <link rel="stylesheet" href="./src/Style/style.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="header">
        <div class="header-logo-section">
          <img
            class="header-logo"
            src="https://www.simform.com/wp-content/uploads/2024/12/simform-logo.svg"
            alt="header-logo"
          />
        </div>
        <div class="start-presentation-section">
          <button class="start-presentation-btn">Start Presentation</button>
        </div>
      </header>
      <main class="main">
        <aside class="left-sidebar">
          <div class="images">
            <!-- <img class="img img-selected" src="./src/assets/img_1.jpg" alt="" /> -->
          </div>
          <div class="upload-image">
            <h3>Upload Images</h3>
            <div class="upload-handler">
              <input
                type="file"
                id="imageInput"
                class="imageInput"
                accept="image/*"
              />
              <button class="img-save-btn">Save</button>
            </div>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
